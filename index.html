<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <style>c
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        .chat-container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #0f0f0f;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 0px;
            margin-top: 15px;
            align-items: flex-start;
            color:#F00000;
        }
        .message.right {
            align-items: flex-end;
            color:#F0F000;
        }
        .message .text {
            max-width: 80%;
            padding: 10px;
            border-radius: 10px;
            background-color: #282828;
            color:#E0E0E0;
        }
        .message.right .text {
            background-color: #25B560;
            color:black;
        }
        .message img {
            width: 100px;
            height: auto;
            border-radius: 10px;
        }
        .message.ref.ll {
            margin-top: 2px;
        }
        .message.ref.lr {
            margin-top: 2px;
        }
        .message.ref.rl {
            margin-top: 2px;
            align-items: flex-end;
        }
        .message.ref.rr {
            margin-top: 2px;
            align-items: flex-end;
        }
        .message.ref .text {
            padding-top: 2px;
            padding-bottom: 2px;
        }
        .message.ref.ll .text {
            background-color: #1D1D1D;
        }
        .message.ref.lr .text {
            background-color: #007520;
            color:#0f0f0f;
        }
        .message.ref.rl .text {
            background-color: #1D1D1D;
        }
        .message.ref.rr .text {
            background-color: #007520;
            color:#0f0f0f;
        }
        .divider {
            width: 100%;
            height: 2px;
            background-color: #ccc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <a href="chat1/chat1.html">chat1.html</a>
    <a href="chat1/chat1.html">chat1.html</a>
</body>
</html>
